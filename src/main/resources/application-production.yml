# Production profile (Render)
# JWT secret MUST be set — app will fail to start otherwise.

shipsmart:
  security:
    require-jwt-secret: true
  mcp:
    base-url: ${SHIPSMART_MCP_URL:}
    api-key: ${SHIPSMART_MCP_API_KEY:}

logging:
  level:
    root: WARN
    com.shipsmart: INFO
    org.springframework.security: WARN

server:
  error:
    include-stacktrace: never
    include-message: never
