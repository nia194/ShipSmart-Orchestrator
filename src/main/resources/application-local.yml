# Local development profile
# JWT secret is optional — filter falls back to unsigned decode.

shipsmart:
  security:
    require-jwt-secret: false
  mcp:
    base-url: ${SHIPSMART_MCP_URL:http://localhost:8001}
    api-key: ${SHIPSMART_MCP_API_KEY:}

logging:
  level:
    com.shipsmart: DEBUG
    org.springframework.security: DEBUG
