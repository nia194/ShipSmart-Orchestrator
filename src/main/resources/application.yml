# ShipSmart Java API — Application Configuration
# All secrets are injected via environment variables.
# Never hardcode credentials here.

spring:
  application:
    name: shipsmart-api-java
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway (validate-only; Supabase remains the schema owner) ─────────────
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Supabase baseline (pre-interview-upgrade)"

  # ── Cache ─────────────────────────────────────────────────────────────────
  cache:
    type: caffeine
    cache-names: quotesByShipmentId,shipmentById
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=120s

server:
  # Render injects PORT automatically. Locally, fall back to SERVER_PORT or 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      # Exporter is off by default in prod; flip-switch via env var or per-profile override.
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.shipsmart: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-}] [%X{traceId:-}] [%X{userId:-}] %-5level %logger{36} - %msg%n"

# ── App Config ──────────────────────────────────────────────────────────────
shipsmart:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    jwt-secret: ${SUPABASE_JWT_SECRET:}
  security:
    require-jwt-secret: ${REQUIRE_JWT_SECRET:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  python-api:
    base-url: ${INTERNAL_PYTHON_API_URL:http://localhost:8000}
  # ── ShipSmart-MCP (tool server) ───────────────────────────────────────────
  # HTTP endpoint of the standalone ShipSmart-MCP service. Empty by default;
  # set SHIPSMART_MCP_URL to enable AI-tool calls from the Java side.
  # See docs/mcp-integration.md for the HTTP contract and a WebClient sample.
  mcp:
    base-url: ${SHIPSMART_MCP_URL:}
    api-key: ${SHIPSMART_MCP_API_KEY:}
  # ── FedEx Configuration ───────────────────────────────────────────────────
  fedex:
    base-url: ${FEDEX_BASE_URL:https://apis-sandbox.fedex.com}
    client-id: ${FEDEX_CLIENT_ID:}
    client-secret: ${FEDEX_CLIENT_SECRET:}
    account-number: ${FEDEX_ACCOUNT_NUMBER:}

  # ── Rate limiting (Bucket4j; per-IP, in-memory) ───────────────────────────
  rate-limit:
    enabled: ${SHIPSMART_RATE_LIMIT_ENABLED:true}
    shipments-per-minute: ${SHIPSMART_RATE_LIMIT_SHIPMENTS:20}
    quotes-per-minute: ${SHIPSMART_RATE_LIMIT_QUOTES:30}
    bookings-per-minute: ${SHIPSMART_RATE_LIMIT_BOOKINGS:10}

  # ── Idempotency keys (POST /shipments, POST /bookings/redirect) ───────────
  idempotency:
    enabled: ${SHIPSMART_IDEMPOTENCY_ENABLED:true}
    ttl-hours: ${SHIPSMART_IDEMPOTENCY_TTL_HOURS:24}

  # ── Cache TTLs ────────────────────────────────────────────────────────────
  cache:
    quotes-ttl: ${SHIPSMART_CACHE_QUOTES_TTL:PT10M}
    shipment-ttl: ${SHIPSMART_CACHE_SHIPMENT_TTL:PT2M}

  # ── Quote provider fanout executor ────────────────────────────────────────
  executor:
    quote-provider:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 100
    audit:
      core-pool-size: 2
      max-pool-size: 2
      queue-capacity: 500

# ── OpenAPI / Swagger UI ─────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
