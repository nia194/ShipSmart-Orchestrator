# ShipSmart Java API — Application Configuration
# All secrets are injected via environment variables.
# Never hardcode credentials here.

spring:
  application:
    name: shipsmart-api-java
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  # Render injects PORT automatically. Locally, fall back to SERVER_PORT or 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.shipsmart: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"

# ── App Config ──────────────────────────────────────────────────────────────
shipsmart:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    jwt-secret: ${SUPABASE_JWT_SECRET:}
  security:
    require-jwt-secret: ${REQUIRE_JWT_SECRET:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  python-api:
    base-url: ${INTERNAL_PYTHON_API_URL:http://localhost:8000}
  # ── FedEx Configuration ───────────────────────────────────────────────────
  fedex:
    base-url: ${FEDEX_BASE_URL:https://apis-sandbox.fedex.com}
    client-id: ${FEDEX_CLIENT_ID:}
    client-secret: ${FEDEX_CLIENT_SECRET:}
    account-number: ${FEDEX_ACCOUNT_NUMBER:}
